services:
  - type: web
    name: hardcore-fashion
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --no-input
    startCommand: daphne -b 0.0.0.0 -p $PORT ecommerce.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: hardcore-fashion.onrender.com
      - key: OTP_HASH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hardcore-fashion-db
          property: connectionString

databases:
  - name: hardcore-fashion-db
    plan: free
