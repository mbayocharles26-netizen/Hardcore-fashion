{% extends "base.html" %}
{% block title %}Forgot Password — Hardcore Fashion Store{% endblock %}

{% block content %}
<div class="form-card">
  <h2>Reset Password (OTP Verification)</h2>

  <form id="forgot-password-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com" />
    </div>

    <div class="form-group" id="otp-block" style="display:none">
      <label>Enter OTP</label>
      <input type="text" id="otp" inputmode="numeric" maxlength="6" placeholder="6-digit code" disabled />
    </div>

    <div class="form-group" id="newpass-block" style="display:none">
      <label>New Password</label>
      <input type="password" id="new_password" placeholder="••••••••" disabled />
    </div>

    <div class="form-actions" style="display:flex;gap:0.75rem;">
      <button type="submit" id="request-otp-btn" class="btn btn-gold" style="width:100%">Request OTP</button>
      <button type="button" id="verify-reset-btn" class="btn" style="width:100%; display:none;" disabled>Verify & Reset</button>
    </div>
  </form>

  <div class="form-footer">
    Remembered your password? <a href="/login/">Login</a>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const form = document.getElementById('forgot-password-form');
const requestBtn = document.getElementById('request-otp-btn');
const verifyBtn = document.getElementById('verify-reset-btn');
const otpBlock = document.getElementById('otp-block');
const newpassBlock = document.getElementById('newpass-block');

form.addEventListener('submit', async e => {
  e.preventDefault();
  requestBtn.textContent = 'Sending…'; requestBtn.disabled = true;

  const res = await fetch('/api/password/request-otp/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: document.getElementById('email').value })
  });

  let data = null;
  if (!res.ok) {
    const text = await res.text();
    try { data = JSON.parse(text); } catch { data = { detail: text }; }
  } else {
    data = await res.json().catch(() => null);
  }

  if (res.ok) {
    showToast('OTP sent. Check your email.');
    otpBlock.style.display = 'block';
    newpassBlock.style.display = 'block';
    document.getElementById('otp').disabled = false;
    document.getElementById('otp').required = true;
    document.getElementById('new_password').disabled = false;
    document.getElementById('new_password').required = true;
    verifyBtn.style.display = 'inline-block';
    verifyBtn.disabled = false;
  } else {
    const msg = data?.detail || Object.values(data || {}).flat()[0];
    showToast(msg || 'OTP request failed.');
  }

  requestBtn.textContent = 'Request OTP'; requestBtn.disabled = false;
});

verifyBtn.addEventListener('click', async () => {
  verifyBtn.textContent = 'Verifying…'; verifyBtn.disabled = true;

  const res = await fetch('/api/password/verify-otp/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      otp: document.getElementById('otp').value,
      new_password: document.getElementById('new_password').value,
    })
  });

  if (res.ok) {
    showToast('Password reset successful. Please log in.');
    setTimeout(() => window.location.href = '/login/', 900);
  } else {
    const text = await res.text();
    let data = null;
    try { data = JSON.parse(text); } catch { data = { detail: text }; }
    const msg = data?.detail || Object.values(data || {}).flat()[0];
    showToast(msg || 'OTP verify failed.');
    verifyBtn.textContent = 'Verify & Reset'; verifyBtn.disabled = false;
  }
});
</script>
{% endblock %}
