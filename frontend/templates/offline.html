{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline – Hardcore Fashion Store</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <style>
    .offline-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    .offline-icon { font-size: 4rem; margin-bottom: 1rem; }
    .offline-container h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .offline-container p { color: #aaa; margin-bottom: 1.5rem; }
    .btn-retry {
      background: #ff4500;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">⚡ Hardcore Fashion</a>
  </nav>
  <main>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1>You're Offline</h1>
      <p>No internet connection. Check your network and try again.</p>
      <button class="btn-retry" onclick="window.location.reload()">Retry</button>
    </div>
  </main>
  <footer>
    <p>&copy; 2024 Hardcore Fashion Store. All rights reserved.</p>
  </footer>
</body>
</html>
